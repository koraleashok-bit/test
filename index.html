<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devaki Paithani | Premium Silk Sarees</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* --- Color Palette & Variables --- */
        :root {
            --primary-color: #5C1A1B; 
            --accent-color: #D4AF37;  
            --bg-color: #FAF9F6;      
            --text-dark: #333333;
            --text-light: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* --- Reset & Base Styles --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
        }

        /* --- Header & Navigation --- */
        header {
            background-color: #ffffff;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container img {
            height: 60px;
            object-fit: contain;
        }

        .cart-btn {
            background: none;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cart-btn:hover {
            background: var(--primary-color);
            color: var(--text-light);
        }

        .cart-count {
            background: var(--accent-color);
            color: white;
            padding: 2px 8px;
            border-radius: 50%;
            font-size: 14px;
        }

        /* --- Hero Section --- */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(to bottom, #ffffff, var(--bg-color));
        }

        .hero h1 {
            font-size: 2.8rem;
            margin-bottom: 15px;
        }

        .hero p {
            color: #666;
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
        }

        /* --- Controls (Sorting) --- */
        .controls {
            display: flex;
            justify-content: flex-end;
            padding: 0 5%;
            margin-bottom: 20px;
        }

        .sort-select {
            padding: 10px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            outline: none;
            cursor: pointer;
            background-color: white;
        }

        /* --- Product Grid --- */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 5% 60px;
        }

        .product-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: var(--transition);
            position: relative;
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(92, 26, 27, 0.15);
        }

        .product-img-wrapper {
            width: 100%;
            height: 350px;
            overflow: hidden;
            background: #f5f5f5;
        }

        .product-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-img-wrapper img {
            transform: scale(1.05);
        }

        .product-info {
            padding: 20px;
            text-align: center;
        }

        .product-title {
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .product-price {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 1.3rem;
            margin-bottom: 15px;
        }

        .add-to-cart-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 0;
            width: 100%;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            transition: var(--transition);
        }

        .add-to-cart-btn:hover {
            background-color: var(--accent-color);
        }

        /* --- Cart Sidebar --- */
        .cart-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
            z-index: 1000;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
            transition: var(--transition);
            z-index: 1001;
            display: flex;
            flex-direction: column;
        }

        .cart-sidebar.open {
            right: 0;
        }

        .cart-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .cart-item img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            object-fit: cover;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-title {
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .cart-item-price {
            color: var(--primary-color);
            font-weight: 600;
        }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid #eee;
            background: #fafafa;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .checkout-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .checkout-btn:hover {
            background: var(--accent-color);
        }

        /* --- Checkout Modal --- */
        .checkout-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            z-index: 1002;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            opacity: 0;
            visibility: hidden;
            transition: var(--transition);
        }

        .checkout-modal.open {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            visibility: visible;
        }

        .checkout-summary {
            background: var(--bg-color);
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: var(--transition);
        }

        .whatsapp-btn:hover {
            background: #128C7E;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        /* --- Loaders & Animations --- */
        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease;
        }

        .loader-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(212, 175, 55, 0.3);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            margin-top: 20px;
            font-family: 'Playfair Display', serif;
            color: var(--primary-color);
            font-size: 1.2rem;
            font-weight: 600;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--primary-color);
            color: white;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: 500;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.26, 1.55);
            z-index: 10000;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        
        /* Mobile adjustments */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.2rem; }
            .product-img-wrapper { height: 300px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="./logo.jpg" alt="Devaki Paithani Logo">
        </div>
        <button class="cart-btn" onclick="toggleCart()">
            Cart <span class="cart-count" id="cart-count">0</span>
        </button>
    </header>

    <section class="hero">
        <h1>Welcome to Devaki Paithani</h1>
        <p>Discover the authentic elegance and timeless tradition of premium soft silk Kalanjali Paithani sarees.</p>
    </section>

    <div class="controls">
        <select class="sort-select" id="sort-select" onchange="sortProducts()">
            <option value="default">Sort by: Default</option>
            <option value="asc">Price: Low to High</option>
        </select>
    </div>

    <main class="product-grid" id="product-grid">
        </main>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Your Cart</h3>
            <button class="close-cart" onclick="toggleCart()">&times;</button>
        </div>
        <div class="cart-items" id="cart-items">
            <p style="text-align:center; color:#888; margin-top: 20px;">Your cart is empty.</p>
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price">₹0</span>
            </div>
            <button class="checkout-btn" onclick="proceedToCheckout()">Proceed To Checkout</button>
        </div>
    </div>

    <div class="checkout-modal" id="checkout-modal">
        <button class="close-modal" onclick="closeCheckout()">&times;</button>
        <h2>Order Summary</h2>
        <p>Review your items before sending to WhatsApp.</p>
        <div class="checkout-summary" id="checkout-summary">
            </div>
        <button class="whatsapp-btn" onclick="sendToWhatsApp()">
            <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" viewBox="0 0 16 16">
                <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c-.003 1.396.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
            </svg>
            Copy & Open WhatsApp
        </button>
    </div>

    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loader-text">Loading...</div>
    </div>

    <div class="toast" id="toast">Added to Cart</div>

    <script>
        // --- Product Data ---
        // Changed image paths to explicitly look in the current folder (./)
        const products = [
            { id: 1, name: "Soft Silk Kalanjali Paithani (Green Forest)", price: 1950, image: "1.jpg" },
            { id: 2, name: "Soft Silk Kalanjali Paithani (Reddish)", price: 1950, image: "./2.jpg" },
            { id: 3, name: "Soft Silk Kalanjali Paithani (Blue)", price: 1950, image: "./3.jpg" },
            { id: 4, name: "Soft Silk Kalanjali Paithani (Purple)", price: 1950, image: "./4.jpg" }
        ];

        let cart = [];

        // --- Initialize App ---
        function init() {
            renderProducts(products);
        }

        // --- Render Products ---
        function renderProducts(productArray) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';

            productArray.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-img-wrapper">
                        <img src="${product.image}" alt="${product.name}">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">${product.name}</h3>
                        <div class="product-price">₹${product.price.toLocaleString('en-IN')}</div>
                        <button class="add-to-cart-btn" onclick="addToCart(${product.id})">Add to Cart</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- Sorting ---
        function sortProducts() {
            const sortType = document.getElementById('sort-select').value;
            let sortedProducts = [...products];

            if (sortType === 'asc') {
                sortedProducts.sort((a, b) => a.price - b.price);
            }
            renderProducts(sortedProducts);
        }

        // --- Add to Cart with 2s Delay ---
        function addToCart(productId) {
            showLoader("Adding item to cart...");
            
            // Changed from 3000 to 2000
            setTimeout(() => {
                const product = products.find(p => p.id === productId);
                cart.push(product);
                updateCartUI();
                hideLoader();
                showToast("Item added to cart successfully!");
            }, 2000); 
        }

        // --- Update Cart UI ---
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;

            const cartItemsContainer = document.getElementById('cart-items');
            let totalPrice = 0;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p style="text-align:center; color:#888; margin-top: 20px;">Your cart is empty.</p>';
                document.getElementById('cart-total-price').innerText = '₹0';
                return;
            }

            cartItemsContainer.innerHTML = '';
            
            cart.forEach((item, index) => {
                totalPrice += item.price;
                const itemEl = document.createElement('div');
                itemEl.className = 'cart-item';
                itemEl.innerHTML = `
                    <img src="${item.image}" alt="${item.name}">
                    <div class="cart-item-details">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-price">₹${item.price.toLocaleString('en-IN')}</div>
                    </div>
                `;
                cartItemsContainer.appendChild(itemEl);
            });

            document.getElementById('cart-total-price').innerText = `₹${totalPrice.toLocaleString('en-IN')}`;
        }

        // --- Toggle Cart Drawer ---
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('open');
            document.getElementById('cart-overlay').classList.toggle('open');
        }

        // --- Proceed To Checkout with 2s Delay ---
        function proceedToCheckout() {
            if (cart.length === 0) {
                alert("Your cart is empty!");
                return;
            }

            toggleCart();
            showLoader("Preparing your checkout summary...");

            // Changed from 3000 to 2000
            setTimeout(() => {
                hideLoader();
                openCheckoutModal();
            }, 2000);
        }

        // --- Open Checkout Modal ---
        function openCheckoutModal() {
            const summaryContainer = document.getElementById('checkout-summary');
            let summaryHTML = '<ul style="list-style:none; padding:0;">';
            let total = 0;

            cart.forEach((item, index) => {
                summaryHTML += `<li style="margin-bottom: 8px; border-bottom: 1px dashed #ccc; padding-bottom: 5px;">
                    ${index + 1}. ${item.name} <br> <strong style="color:var(--primary-color)">₹${item.price.toLocaleString('en-IN')}</strong>
                </li>`;
                total += item.price;
            });

            summaryHTML += `</ul>
            <div style="margin-top: 15px; font-size: 1.2rem; text-align: right;">
                <strong>Grand Total: ₹${total.toLocaleString('en-IN')}</strong>
            </div>`;

            summaryContainer.innerHTML = summaryHTML;
            
            document.getElementById('cart-overlay').classList.add('open'); 
            document.getElementById('checkout-modal').classList.add('open');
        }

        function closeCheckout() {
            document.getElementById('checkout-modal').classList.remove('open');
            document.getElementById('cart-overlay').classList.remove('open');
        }

        // --- WhatsApp Integration ---
        function sendToWhatsApp() {
            const phoneNumber = "918446918749";
            let message = "*New Order for Devaki Paithani* 🌸\n\nHello, I would like to place an order for the following items:\n\n";
            let total = 0;

            cart.forEach((item, index) => {
                message += `*${index + 1}.* ${item.name}\nPrice: ₹${item.price.toLocaleString('en-IN')}\n\n`;
                total += item.price;
            });

            message += `*Grand Total: ₹${total.toLocaleString('en-IN')}*\n\nPlease confirm my order.`;

            navigator.clipboard.writeText(message).then(() => {
                showToast("Order details copied! Opening WhatsApp...");
                setTimeout(() => {
                    const encodedMessage = encodeURIComponent(message);
                    window.open(`https://wa.me/${phoneNumber}?text=${encodedMessage}`, '_blank');
                    closeCheckout();
                }, 1500);
            }).catch(err => {
                const encodedMessage = encodeURIComponent(message);
                window.open(`https://wa.me/${phoneNumber}?text=${encodedMessage}`, '_blank');
                closeCheckout();
            });
        }

        // --- Utilities (Loaders & Toasts) ---
        function showLoader(text) {
            document.getElementById('loader-text').innerText = text;
            document.getElementById('loader').classList.add('active');
        }

        function hideLoader() {
            document.getElementById('loader').classList.remove('active');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        window.onload = init;

    </script>
</body>
</html>
